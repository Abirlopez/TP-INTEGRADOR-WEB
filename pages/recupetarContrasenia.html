<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña</title>
    <link rel="stylesheet" href="../styles/recuperarContraseña.css">
</head>

<body>

<header class="encabezado"> 
   <section class="menu-izquierda">
      <a href="../index.html">
        <img class="logo" src="../images/logo.png" alt="logo" height="35">
      </a>
    </section>

    <nav>
        <a href="condiciones.html">Terminos y Condiciones</a>
    </nav>
</header>

<main class="contenedor">

    <section class="formulario">

        <h2>Nueva contraseña</h2>

        <p>Ingresá y confirmá tu nueva contraseña</p>

        <form>

            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" placeholder="Nueva contraseña">

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" placeholder="Confirmar contraseña">

            <button id="boton">Actualizar contraseña</button>

        </form>

        <p id="mensaje"></p>

    </section>

</main>

<script src="../js/nuevaContrasenia.js"></script>

</body>

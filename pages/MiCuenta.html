<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estiloMiPerfil.css">
    <title>Mi Perfil - FlyNow</title>
</head>
<body>
    <header>
        <nav class="menu">
            <section class="menu-izquierda">
              <a href="index.html"><img class="logo" src="../images/logo.png" alt="logo" width="35"></a>
            </section>
            <section class="menu-medio">
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Vuelos</a></li>
                    <li><a href="#">Ofertas</a></li>
                    <li><a href="#">Nosotros</a></li>
                </ul>
            </section>
            <section class="menu-derecha">
                <div class="iniciar-sesion">
                    <a href="#">Iniciar sesión</a>
                    <img class="usuario" src="../images/usuario.png" alt="usuario" width="30">
                </div>
            </section>
        </nav>
    </header>

    <main>
        <div class="titulo">
            <h1>Mi Perfil</h1> 
            <p>Gestioná tu información personal y revisá tus reservas</p>  
        </div>

        <div class="contenedor-principal"> 
            <!-- LOS INPUTS VAN AQUÍ ARRIBA: Controlan todo lo que viene abajo -->
            <input type="radio" name="cuenta" id="informacion" checked>
            <input type="radio" name="cuenta" id="vuelos">

            <!-- LADO IZQUIERDO: Aside -->
            <aside class="detalle"> 
                <h1>Mi perfil</h1>
                <div class="linea-separadora"></div>
                
                <label for="informacion" class="barra-lateral">
                    Información Personal
                </label>

                <label for="vuelos" class="barra-lateral">
                    Mis Vuelos Reservados
                </label>
            </aside>

            <!-- LADO DERECHO: Sección de información -->
            <section class="bloque-informacion">
                <!-- Panel 1: Información Personal -->
                <div class="panel-personal">
                    <h2>Información Personal</h2>
                    
                </div>

                <!-- Panel 2: Mis Vuelos -->
                <div class="panel-vuelos">
                    <h2>Mis Vuelos Reservados</h2>
                    <div class="vuelo-item">
                        <input type="checkbox" id="vuelo1" class="boton-vuelo">
                        <label for="vuelo1" class="vuelo-header">
                            <div class="info-vuelo">
                                <strong>Buenos Aires — Madrid (MAD)</strong>
                                <p>10/08/2024 - 20/08/2024</p>
                            </div>
                            <div class="precio-seccion">
                                <span class="precio">$ 550 USD</span>
                                <span class="flecha">∨</span>
                            </div>
                        </label>
                        <div class="vuelo-detalle">
                            <p><strong>Ida:</strong> Ezeiza (EZE) — Madrid (MAD)</p>
                            <p><strong>Vuelta:</strong> Madrid (MAD) — Ezeiza (EZE)</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>

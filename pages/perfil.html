<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil</title>
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/perfil.css">
    <link rel="stylesheet" href="../styles/footer.css">
</head>

<body>

<header class="encabezado">
  <a href="../index.html">
    <img class="logo" src="../images/logo.png" height="35">
  </a>

  <nav>
    <a href="../index.html">Inicio</a>
  </nav>
</header>

<main class="contenedor">

  <!-- MENSAJE SI NO ESTÁ LOGUEADO -->
  <section id="sinSesion" class="sin-sesion">
    <h2>Debes iniciar sesión</h2>
    <p>Para acceder a tu perfil necesitas iniciar sesión.</p>
    <a href="InicioSesion.html">Ir al login</a>
  </section>

  
  <section id="perfil" class="perfil">

    <h2>Mi perfil</h2>

    <form id="formPerfil">
    <p id="mensajeError" class="error"></p>
      <label>Nombre</label>
      <input id="nombre" type="text">

      <label>Email</label>
      <input id="email" type="email" disabled>

      <label>Teléfono</label>
      <input id="telefono" type="text">

      <label>Género</label>

<div class="genero">
  <label> <input type="radio" name="genero" value="m"> Masculino </label>

  <label> <input type="radio" name="genero" value="f"> Femenino </label>
</div>

      <label>Fecha de nacimiento</label>
      <input id="nacimiento" type="date">

      <label>Nueva contraseña</label>
      <input id="password" type="password">

      <button type="submit">Guardar cambios</button>

    </form>

    <button id="logout">Cerrar sesión</button>
    <button id="eliminar">Eliminar cuenta</button>

  </section>

</main>

<script src="../js/perfil.js"></script>

 <mi-footer></mi-footer>
<script src="../js/componentes.js"></script>
</body>

</html>
